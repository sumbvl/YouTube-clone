<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Clone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="header-left">
                <img src="menu.png" alt="menu" class="menu">
                <div class="logo">
                    <img src="yt logo.png" alt="menu" class="menu" width="37px" height="35px">
                    <a href="https://www.youtube.com/" target="_self" class="logo">YouTube <sup>PK</sup></a>
                </div>
            </div>
            <div class="header-center">
                <form class="search-form">
                    <input id="search" type="text" autocomplete="off" placeholder="Search" class="search-input">
                    <button type="submit" class="search-button">
                        <img src="search button.png" class="search-icon">
                    </button>
                </form>
            </div>
            <img src="voice.png" alt="voice" class="voice-icon">

            <div class="header-right">
                <button class="create-button">
                    <img src="1" alt="create" class="create-icon">
                </button>
                <button>
                    <img src="2" alt="notification" class="header-icon">
                    <span>7</span>
                </button>
                <button>
                    <img src="2" alt="profile" class="header-icon">
                </button>
            </div>
        </div>
    </header>
    <div class="page-body"\>
        <aside class="sidebar">
            <ul class="sidebar-list">
                <li class="side-item active">
                    <a href="https://www.youtube.com/" target="_top">
                        <img src="wiwiwi" alt="home" class="sidebar-icon">
                        Home
                    </a>
                </li>
                <li class="sidebar-item">
                    <a href="https://www.youtube.com/shorts" target="_top">
                        <img src="wiwiwi" alt="Shorts" class="sidebar-icon">
                        Shorts
                    </a>
                </li>
                <hr>
                <span>Subscriptions</span>
                <li class="sidebar-item">
                    <img src="wiwiwi" alt="Subscriptions" class="sidebar-icon">
                    Subscriptions
                </li>
                <li class="sidebar-item">
                    <img src="wiwiwi" alt="Library" class="sidebar-icon">
                    Library
                </li>
                <hr>
                <span>Explore</span>
            </ul>
        </aside>
        <main>
            <div>
                <div class="filter-chips-row">
                    <button class="filter-chip active">All</button>
                    <button class="filter-chip">Live</button>
                    <button class="filter-chip">Food</button>
                    <button class="filter-chip">Fashion</button>
                    <button class="filter-chip">Music</button>
                    <button class="filter-chip">Gaming</button>
                    <button class="filter-chip">Beauty</button>
                </div>
                <section class="video-list">
                    <article class="video-card">
                        <iframe width="500" height="300"
                            src="https://www.youtube.com/embed/hOYEWhjopSs?si=gnegqBxvkY3ooYjR"
                            title="YouTube video player" frameborder="0"
                            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                            referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
                        <div class="video-info">
                            <div class="video-meta">
                                <h3 class="video-title">STILL GAME - Navid's Funny Tummy Chocolate</h3>
                                <img src="wiwiwi" alt="three dots" class="three dots">
                            </div>
                            <p class="video-stats">717k views · 14 years ago</p>
                            <div>
                                <img src="wiwiwi" alt="channel" class="channel-icon">
                                <span class="channel-name">stillgame</span>
                            </div>
                            <p>#tags</p>
                            <span>4K</span>
                        </div>
                    </article>
                    <br>
                    <article class="video-card">
                        <iframe width="500" height="300"
                            src="https://www.youtube.com/embed/hOYEWhjopSs?si=gnegqBxvkY3ooYjR"
                            title="YouTube video player" frameborder="0"
                            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                            referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
                        <div class="video-info">
                            <div class="video-meta">
                                <h3 class="video-title">STILL GAME - Navid's Funny Tummy Chocolate</h3>
                                <img src="wiwiwi" alt="three dots" class="three dots">
                            </div>
                            <p class="video-stats">717k views · 14 years ago</p>
                            <div>
                                <img src="wiwiwi" alt="channel" class="channel-icon">
                                <span class="channel-name">stillgame</span>
                            </div>
                            <p>#tags</p>
                            <span>4K</span>
                        </div>
                    </article>
                </section>
                <br>
            </div>
    </div>
    </main>
    </div>
</body>
</html>
